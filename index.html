<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>Plattegrond Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" integrity="sha384-SALc35EccAf6RzGw4iNsyj7kTPr33K7RoGzYu+7heZhT8s0GZouafRiCg1qy44AS" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" integrity="sha384-c9d8RFSL+u3exBOJ4Yp3HUJXS4znl9f+z66d1y54ig+ea249SpqR+w1wyvXz/lk+" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- Login screen -->
  <div class="login-screen" id="login-screen">
    <div style="position:absolute; bottom:12px; left:16px; font-size:12px; color:#aaa;">v1.4.4</div>
    <div class="login-box">
      <h1>Plattegrond Dashboard</h1>
      <p>Voer het wachtwoord in om door te gaan</p>
      <input type="password" id="login-password" placeholder="Wachtwoord" autocomplete="off">
      <label style="display:inline-flex; align-items:center; gap:8px; margin-bottom:16px; font-size:14px; color:#666; cursor:pointer;">
        <input type="checkbox" id="login-remember" style="width:18px; height:18px; flex-shrink:0; margin:0;"> <span style="line-height:1;">Wachtwoord onthouden</span>
      </label>
      <button id="login-btn">Inloggen</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- App (hidden until logged in) -->
  <div id="app-container" style="display:none;">
  <div style="position:fixed; bottom:12px; left:16px; font-size:12px; color:#aaa; z-index:1000; pointer-events:none;">v1.4.4</div>

  <!-- Toast notification -->
  <div id="toast" style="display:none; position:fixed; top:calc(var(--topbar-h, 52px) + 12px); left:50%; transform:translateX(-50%); padding:14px 28px; border-radius:10px; font-size:16px; font-weight:600; z-index:500; box-shadow:0 4px 16px rgba(0,0,0,0.25); cursor:pointer; max-width:90vw; text-align:center;"></div>

  <!-- Top bar with dropdowns -->
  <div class="topbar">
    <h1>Deuren</h1>
    <select id="customer-select">
      <option value="">-- Kies klant --</option>
    </select>
    <select id="floorplan-select" disabled>
      <option value="">-- Kies plattegrond --</option>
    </select>
    <span style="flex:1;"></span>
    <button class="btn-reset" id="btn-reset" style="display:none;">Reset zoom</button>
    <button class="btn-reset" id="btn-edit" style="display:none;">&#9998; Bewerken</button>
    <div style="position:relative;">
      <button class="btn-reset" id="btn-menu" style="padding:6px 10px; font-size:18px; line-height:1;">&#9776;</button>
      <div id="topbar-menu" style="display:none; position:absolute; right:0; top:100%; margin-top:4px; background:white; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.2); min-width:160px; z-index:200; overflow:hidden;">
        <button id="btn-logout" style="display:block; width:100%; padding:14px 20px; border:none; background:white; font-size:16px; font-weight:600; color:#d93025; text-align:left; cursor:pointer;">Uitloggen</button>
      </div>
    </div>
  </div>

  <!-- Edit mode bar -->
  <div class="edit-bar" id="edit-bar">
    <span class="edit-label" style="flex:0 0 auto; min-width:140px;">Bewerkingsmodus</span>
    <div style="display:flex; align-items:center; gap:8px; flex:1; justify-content:center;">
      <label style="font-size:13px; color:#e67700; font-weight:600; white-space:nowrap;">Grootte:</label>
      <input type="range" id="edit-marker-size" min="3" max="30" value="15" style="width:180px; height:36px;">
      <span id="edit-size-label" style="font-size:13px; color:#e67700; min-width:24px;">15</span>
    </div>
    <div style="flex:0 0 auto;">
      <button class="btn-edit-cancel" id="btn-edit-cancel">Annuleren</button>
      <button class="btn-edit-save" id="btn-edit-save">Opslaan</button>
    </div>
  </div>

  <!-- Logout confirmation -->
  <div id="logout-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:299;"></div>
  <div id="logout-popup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:24px; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.3); z-index:300; text-align:center; min-width:260px;">
    <p style="font-size:17px; font-weight:600; color:#333; margin-bottom:20px;">Weet je zeker dat je wilt uitloggen?</p>
    <div style="display:flex; gap:8px; justify-content:center;">
      <button id="logout-confirm" style="font-size:16px; padding:10px 24px; border:none; border-radius:8px; background:#d93025; color:white; font-weight:600; cursor:pointer;">Uitloggen</button>
      <button id="logout-cancel" style="font-size:16px; padding:10px 24px; border:none; border-radius:8px; background:#e0e0e0; color:#333; font-weight:600; cursor:pointer;">Annuleren</button>
    </div>
  </div>

  <!-- Cancel edit confirmation -->
  <div id="cancel-edit-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:299;"></div>
  <div id="cancel-edit-popup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:24px; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.3); z-index:300; text-align:center; min-width:260px;">
    <p style="font-size:17px; font-weight:600; color:#333; margin-bottom:20px;">Wijzigingen annuleren? Alles wordt teruggedraaid.</p>
    <div style="display:flex; gap:8px; justify-content:center;">
      <button id="cancel-edit-confirm" style="font-size:16px; padding:10px 24px; border:none; border-radius:8px; background:#d93025; color:white; font-weight:600; cursor:pointer;">Ja, annuleren</button>
      <button id="cancel-edit-back" style="font-size:16px; padding:10px 24px; border:none; border-radius:8px; background:#e0e0e0; color:#333; font-weight:600; cursor:pointer;">Terug</button>
    </div>
  </div>

  <!-- Edit popup + overlay -->
  <div class="edit-overlay" id="edit-overlay"></div>
  <div class="edit-popup" id="edit-popup">
    <h3 id="edit-popup-title">Nieuwe deur</h3>
    <div id="edit-popup-input-row" style="display:flex; gap:8px; margin-bottom:16px;">
      <input type="text" id="edit-popup-input" placeholder="Deurcode" maxlength="20" autocomplete="off" style="flex:1; margin-bottom:0;">
      <button id="btn-scan-qr" style="padding:8px 14px; border:none; border-radius:8px; background:#1a73e8; color:white; font-size:16px; font-weight:600; cursor:pointer; white-space:nowrap;">&#128247; Scan</button>
    </div>
    <div id="edit-popup-error" style="color:#d93025; font-size:14px; font-weight:600; margin-bottom:12px; min-height:20px;"></div>
    <div class="popup-buttons" id="edit-popup-buttons"></div>
  </div>

  <!-- QR Scanner overlay -->
  <div id="qr-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:400; flex-direction:column; align-items:center; justify-content:center;">
    <div style="position:relative; width:min(80vw, 400px); max-width:400px;">
      <div id="qr-reader" style="width:100%; border-radius:12px; overflow:hidden;"></div>
      <p id="qr-status" style="color:white; font-size:15px; margin-top:12px; text-align:center;">Richt de camera op een QR code</p>
      <button id="btn-qr-close" style="margin-top:16px; width:100%; padding:14px; border:none; border-radius:8px; background:white; color:#333; font-size:16px; font-weight:600; cursor:pointer;">Sluiten</button>
    </div>
  </div>

  <!-- Info panel — always visible when floorplan is loaded -->
  <div class="info-panel" id="info-panel" style="display:none;">
    <div style="min-width:0;">
      <span class="door-name" id="door-name">—</span>
      <span class="door-status" id="door-status"></span>
    </div>
    <div id="status-count" style="font-size:16px; font-weight:600; color:#555;"></div>
    <div style="display:flex; align-items:center; gap:8px;">
      <button class="btn btn-jotform disabled" id="btn-jotform">Open JotForm</button>
      <button class="btn btn-done disabled" id="btn-done">Gedaan</button>
      <button class="btn btn-close disabled" id="btn-close">&#10005;</button>
    </div>
  </div>

  <!-- SVG display area -->
  <div class="loading" id="loading">Kies een klant en plattegrond om te beginnen.</div>
  <div class="svg-container" id="svg-container" style="display:none;"></div>

  <!-- Side panel toggle button -->
  <button class="btn-panel-toggle" id="btn-panel-toggle" style="display:none;">Deuren</button>

  <!-- Side panel with door list -->
  <div class="side-panel" id="side-panel">
    <div class="side-panel-header" id="side-panel-header">Deuren</div>
    <div class="side-panel-list" id="side-panel-list"></div>
  </div>

  </div><!-- /app-container -->

  <script src="app.js"></script>
</body>
</html>
